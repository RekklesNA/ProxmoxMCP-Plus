  </text>
  <text x="118" y="381" fill="#F3F7FA" font-family="Consolas, 'Courier New', monospace" font-size="18">
    OpenAPI and verify /health."
  </text>
  <rect x="118" y="406" width="106" height="30" rx="15" fill="#1D4F73"/>
  <text x="142" y="426" fill="#DFF3FF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">

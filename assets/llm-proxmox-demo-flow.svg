  </text>
  <text x="118" y="291" fill="#F3F7FA" font-family="Consolas, 'Courier New', monospace" font-size="18">
    "Create a Debian test VM,
  </text>
  <text x="118" y="321" fill="#F3F7FA" font-family="Consolas, 'Courier New', monospace" font-size="18">
    snapshot it, then expose
  </text>
  <text x="118" y="351" fill="#F3F7FA" font-family="Consolas, 'Courier New', monospace" font-size="18">

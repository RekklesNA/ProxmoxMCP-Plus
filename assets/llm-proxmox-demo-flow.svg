  </text>
  <rect x="234" y="406" width="126" height="30" rx="15" fill="#1D4F73"/>
  <text x="255" y="426" fill="#DFF3FF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">

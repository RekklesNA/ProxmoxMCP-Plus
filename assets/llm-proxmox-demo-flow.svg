  </text>

  <rect x="454" y="191" width="295" height="278" rx="26" fill="url(#accent)"/>
  <rect x="468" y="205" width="267" height="250" rx="22" fill="#101E2D"/>
  <text x="498" y="250" fill="#FFD8BF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">

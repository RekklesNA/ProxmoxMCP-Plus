  </text>

  <rect x="828" y="205" width="280" height="116" rx="24" fill="url(#card)" stroke="#446A8C"/>
  <text x="854" y="246" fill="#FFB997" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">

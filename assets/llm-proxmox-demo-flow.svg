  </text>

  <path d="M378 330H438" stroke="#FFB997" stroke-width="6" stroke-linecap="round"/>
  <path d="M738 330H802" stroke="#FFB997" stroke-width="6" stroke-linecap="round"/>
  <path d="M428 318L446 330L428 342" stroke="#FFB997" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M790 318L808 330L790 342" stroke="#FFB997" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="92" y="514" width="1016" height="72" rx="20" fill="#0C1A28" stroke="#264763"/>
  <text x="123" y="556" fill="#F3F7FA" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Real E2E verified:
  </text>
  <text x="334" y="556" fill="#9CE5C2" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">

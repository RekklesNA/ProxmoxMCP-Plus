  </text>

  <rect x="828" y="343" width="280" height="112" rx="24" fill="#12324D" stroke="#446A8C"/>
  <text x="854" y="383" fill="#9CE5C2" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">

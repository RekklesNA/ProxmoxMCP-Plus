<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="1112" y2="627" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1724"/>
      <stop offset="1" stop-color="#102A43"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#13283E"/>
      <stop offset="1" stop-color="#1C3A57"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF6B35"/>
      <stop offset="1" stop-color="#FF9F1C"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1240" height="715" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="28" fill="url(#bg)"/>
  <circle cx="165" cy="132" r="118" fill="#14304B"/>
  <circle cx="1036" cy="566" r="136" fill="#13324B"/>
  <circle cx="1087" cy="123" r="76" fill="#173A58"/>

  <g filter="url(#shadow)">
    <rect x="60" y="56" width="1080" height="563" rx="28" fill="#0E2236" fill-opacity="0.9" stroke="#2B4B68"/>
  </g>

  <text x="92" y="118" fill="#F3F7FA" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">
